<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshith</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body {
    background:black;
    color:white;
    overflow-x:hidden;
}

/* ENTRY */
.entry {
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
    cursor:pointer;
}

.entry h1 {
    font-size:60px;
    letter-spacing:6px;
    animation:pulse 2s infinite;
}

@keyframes pulse {
    0%,100% {opacity:0.5;}
    50% {opacity:1;}
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size: clamp(40px, 8vw, 100px);
    animation:fadeUp 1.2s ease forwards;
}

.hero h2 {
    font-size: clamp(40px, 8vw, 100px);
    color:#666;
    animation:fadeUp 1.2s ease forwards;
    animation-delay:0.6s;
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(40px);}
    to {opacity:1; transform:translateY(0);}
}

/* ARROW */
.arrow {
    position:absolute;
    bottom:30px;
    font-size:30px;
    animation:bounce 2s infinite;
}

@keyframes bounce {
    0%,100% {transform:translateY(0);}
    50% {transform:translateY(10px);}
}

/* SECTION */
.section {
    padding:40px 5%;
}

/* TITLE */
.name {
    text-align:center;
    font-size:28px;
    margin-bottom:25px;
    color:#ccc;
}

/* LONG VIDEO (PERFECT RATIO) */
.video {
    width:100%;
    aspect-ratio:16/9;
    margin-bottom:25px;
    opacity:0;
    transform:translateY(40px);
    transition:0.8s;
}

.video.show {
    opacity:1;
    transform:translateY(0);
}

.video iframe {
    width:100%;
    height:100%;
    border:none;
    border-radius:10px;
}

/* SHORTS GRID */
.shorts {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

/* SHORTS (PERFECT RATIO) */
.shorts iframe {
    width:100%;
    aspect-ratio:9/16;
    border:none;
    border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){

    .shorts {
        grid-template-columns:1fr;
    }

    .hero h1, .hero h2 {
        font-size:32px;
    }
}

/* CONTACT */
.contact {
    padding:50px 20px;
    text-align:center;
}

.contact h2 {
    margin-bottom:20px;
}

/* BUTTON */
.email {
    display:inline-block;
    padding:12px 20px;
    border:1px solid #444;
    border-radius:50px;
    color:#aaa;
    text-decoration:none;
    transition:0.3s;
}

.email:hover {
    color:#fff;
    border-color:#fff;
    box-shadow:0 0 15px rgba(255,255,255,0.2);
    transform:scale(1.05);
}
</style>
</head>

<body>

<!-- ENTRY -->
<div class="entry" onclick="enterSite()">
    <h1>ENTER</h1>
</div>

<!-- HERO -->
<div class="hero">
    <h1>I don’t edit.</h1>
    <h2>I control emotion.</h2>
    <div class="arrow">↓</div>
</div>

<!-- CONTENT -->
<div class="section">

    <div class="name">Editing Showcase</div>

    <!-- LONG VIDEOS -->
    <div class="video">
        <iframe src="https://www.youtube.com/embed/7iF0aMuY6PI"></iframe>
    </div>

    <div class="video">
        <iframe src="https://www.youtube.com/embed/FFuEp2kLN2I"></iframe>
    </div>

    <!-- SHORTS -->
    <div class="shorts">
        <iframe src="https://www.youtube.com/embed/yFfvWJ4ijwo"></iframe>
        <iframe src="https://www.youtube.com/embed/Vbdw70LQgwA"></iframe>
        <iframe src="https://www.youtube.com/embed/Uxw-Vk4BZQQ"></iframe>
        <iframe src="https://www.youtube.com/embed/RaEjQFuOjyA"></iframe>
    </div>

</div>

<!-- CONTACT -->
<div class="contact">
    <h2>Let’s create something powerful.</h2>

    <a href="https://mail.google.com/mail/?view=cm&to=takkelapallyharshith5@gmail.com" target="_blank" class="email">
        Contact Me
    </a>
</div>

<script>
function enterSite(){
    document.querySelector('.entry').style.display="none";
}

const videos = document.querySelectorAll('.video');

window.addEventListener('scroll', () => {
    videos.forEach(v => {
        const top = v.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            v.classList.add('show');
        }
    });
});
</script>

</body>
</html>
