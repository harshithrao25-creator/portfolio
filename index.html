<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshith</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body {
    background:black;
    color:white;
    overflow-x:hidden;
}

/* ENTRY */
.entry {
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
    cursor:pointer;
    transition:1s;
}

.entry h1 {
    font-size:40px;
    letter-spacing:3px;
    opacity:0.8;
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size: clamp(40px, 8vw, 100px);
}

.hero span {
    color:#777;
}

/* TEXT */
.section {
    padding:120px 15%;
}

.big {
    font-size: clamp(30px, 5vw, 70px);
}

/* VIDEOS */
.video {
    margin-top:100px;
    opacity:0;
    transform:translateY(80px);
    transition:1.2s ease;
}

.video.show {
    opacity:1;
    transform:translateY(0);
}

/* LONG VIDEOS */
.video.wide iframe {
    width:100%;
    height:500px;
    border:none;
}

/* SHORTS */
.video.vertical {
    display:flex;
    justify-content:center;
}

.video.vertical iframe {
    width:300px;
    height:533px;
    border:none;
}

/* CONTACT */
.contact {
    padding:150px 20px;
    text-align:center;
    background: radial-gradient(circle at center, #111, #000);
}

/* CTA TEXT */
.contact h2 {
    font-size: clamp(30px, 5vw, 50px);
    margin-bottom:30px;
    letter-spacing:1px;
}

/* EMAIL (PREMIUM STYLE) */
.email {
    display:inline-block;
    font-size:18px;
    letter-spacing:2px;
    color:#aaa;
    text-decoration:none;
    padding:12px 20px;
    border:1px solid #333;
    border-radius:50px;
    transition:0.4s;
    position:relative;
    overflow:hidden;
}

/* GLOW HOVER */
.email:hover {
    color:#fff;
    border-color:#fff;
    box-shadow:0 0 20px rgba(255,255,255,0.2);
    transform:scale(1.05);
}

/* FADE */
.fade-out {
    opacity:0;
    pointer-events:none;
}
</style>
</head>

<body>

<!-- ENTRY -->
<div class="entry" onclick="enterSite()">
    <h1>ENTER</h1>
</div>

<!-- HERO -->
<div class="hero">
    <h1>
        HARSHITH<br>
        <span>I control emotion.</span>
    </h1>
</div>

<!-- MESSAGE -->
<div class="section">
    <div class="big">
        People don’t remember videos.<br><br>
        They remember how it made them feel.
    </div>
</div>

<!-- VIDEOS -->

<div class="section video wide">
    <iframe src="https://www.youtube.com/embed/7iF0aMuY6PI"></iframe>
</div>

<div class="section video wide">
    <iframe src="https://www.youtube.com/embed/FFuEp2kLN2I"></iframe>
</div>

<div class="section video vertical">
    <iframe src="https://www.youtube.com/embed/yFfvWJ4ijwo"></iframe>
</div>

<div class="section video vertical">
    <iframe src="https://www.youtube.com/embed/Vbdw70LQgwA"></iframe>
</div>

<div class="section video vertical">
    <iframe src="https://www.youtube.com/embed/Uxw-Vk4BZQQ"></iframe>
</div>

<div class="section video vertical">
    <iframe src="https://www.youtube.com/embed/RaEjQFuOjyA"></iframe>
</div>

<!-- CONTACT -->
<div class="contact">
    <h2>Let’s create something impossible to ignore.</h2>
    
    <a href="mailto:takkelapallyharshith5@gmail.com" class="email">
        takkelapallyharshith5@gmail.com
    </a>
</div>

<script>

// ENTRY
function enterSite(){
    document.querySelector('.entry').classList.add('fade-out');
}

// SCROLL ANIMATION
const videos = document.querySelectorAll('.video');

window.addEventListener('scroll', () => {
    videos.forEach(v => {
        const top = v.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            v.classList.add('show');
        }
    });
});

</script>

</body>
</html>
