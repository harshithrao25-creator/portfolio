<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshith</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body {
    background:black;
    color:white;
}

/* ENTRY */
.entry {
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
    cursor:pointer;
    transition:1s;
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size: clamp(40px, 8vw, 100px);
}

.hero h2 {
    font-size: clamp(40px, 8vw, 100px);
    color:#666;
}

/* FADE */
.hero h1 {
    opacity:0;
    animation:fadeIn 1.5s forwards;
}

.hero h2 {
    opacity:0;
    animation:fadeIn 1.5s forwards;
    animation-delay:0.8s;
}

@keyframes fadeIn {
    to {opacity:1;}
}

/* SECTION */
.section {
    padding:80px 10%;
}

/* TITLE */
.name {
    text-align:center;
    font-size:35px;
    margin-bottom:40px;
    color:#ccc;
}

/* VIDEO */
.video {
    margin:60px 0;
    display:flex;
    justify-content:center;
    opacity:0;
    transform:translateY(60px);
    transition:1s;
}

.video.show {
    opacity:1;
    transform:translateY(0);
}

/* LONG */
.video.wide iframe {
    width:90%;
    height:500px;
}

/* SHORT GRID (2 PER ROW) */
.shorts {
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:30px;
    justify-items:center;
}

.shorts iframe {
    width:100%;
    max-width:350px;
    height:600px;
}

/* CONTACT */
.contact {
    padding:80px 20px; /* reduced gap */
    text-align:center;
}

.contact h2 {
    font-size:28px;
    margin-bottom:20px;
}

/* EMAIL BUTTON */
.email {
    display:inline-block;
    padding:14px 24px;
    border:1px solid #444;
    border-radius:50px;
    color:#aaa;
    text-decoration:none;
    transition:0.3s;
}

.email:hover {
    color:#fff;
    border-color:#fff;
    box-shadow:0 0 20px rgba(255,255,255,0.2);
    transform:scale(1.05);
}

/* FADE OUT */
.fade-out {
    opacity:0;
    pointer-events:none;
}
</style>
</head>

<body>

<!-- ENTRY -->
<div class="entry" onclick="enterSite()">
    <h1>ENTER</h1>
</div>

<!-- HERO -->
<div class="hero">
    <h1>I don’t edit.</h1>
    <h2>I control emotion.</h2>
</div>

<!-- CONTENT -->
<div class="section">

    <div class="name">Editing Showcase</div>

    <!-- LONG VIDEOS -->
    <div class="video wide">
        <iframe src="https://www.youtube.com/embed/7iF0aMuY6PI"></iframe>
    </div>

    <div class="video wide">
        <iframe src="https://www.youtube.com/embed/FFuEp2kLN2I"></iframe>
    </div>

    <!-- SHORTS (2 PER ROW) -->
    <div class="shorts">

        <iframe src="https://www.youtube.com/embed/yFfvWJ4ijwo"></iframe>
        <iframe src="https://www.youtube.com/embed/Vbdw70LQgwA"></iframe>
        <iframe src="https://www.youtube.com/embed/Uxw-Vk4BZQQ"></iframe>
        <iframe src="https://www.youtube.com/embed/RaEjQFuOjyA"></iframe>

    </div>

</div>

<!-- CONTACT -->
<div class="contact">
    <h2>Let’s create something powerful.</h2>

    <a href="https://mail.google.com/mail/?view=cm&to=takkelapallyharshith5@gmail.com" 
       target="_blank" 
       class="email">
        Contact Me
    </a>
</div>

<script>

// ENTRY
function enterSite(){
    document.querySelector('.entry').classList.add('fade-out');
}

// SCROLL ANIMATION
const videos = document.querySelectorAll('.video');

window.addEventListener('scroll', () => {
    videos.forEach(v => {
        const top = v.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            v.classList.add('show');
        }
    });
});

</script>

</body>
</html>
