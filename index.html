<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshih</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body {
    background:black;
    color:white;
    overflow-x:hidden;
}

/* ENTRY SCREEN */
.entry {
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
    cursor:pointer;
    transition:1s;
}

.entry h1 {
    font-size:40px;
    letter-spacing:3px;
    opacity:0.8;
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size: clamp(40px, 8vw, 100px);
    line-height:1.1;
}

.hero span {
    color:#777;
}

/* TEXT SECTION */
.section {
    padding:120px 15%;
}

.big {
    font-size: clamp(30px, 5vw, 70px);
    line-height:1.2;
}

/* VIDEO */
.video {
    margin-top:100px;
    opacity:0;
    transform:translateY(80px);
    transition:1.2s ease;
}

.video iframe {
    width:100%;
    height:450px;
    border:none;
}

.video.show {
    opacity:1;
    transform:translateY(0);
}

/* CONTACT */
.contact {
    padding:120px;
    text-align:center;
}

.contact h2 {
    font-size:40px;
    margin-bottom:20px;
}

/* FADE */
.fade-out {
    opacity:0;
    pointer-events:none;
}

</style>
</head>

<body>

<!-- ENTRY -->
<div class="entry" onclick="enterSite()">
    <h1>ENTER</h1>
</div>

<!-- HERO -->
<div class="hero">
    <h1>
        I don’t edit.<br>
        <span>I control emotion.</span>
    </h1>
</div>

<!-- TEXT -->
<div class="section">
    <div class="big">
        People don’t remember videos.<br><br>
        They remember how it made them feel.
    </div>
</div>

<!-- VIDEOS -->
<div class="section video">
    <iframe src="https://www.youtube.com/embed/7iF0aMuY6PI"></iframe>
</div>

<div class="section video">
    <iframe src="https://www.youtube.com/embed/FFuEp2kLN2I"></iframe>
</div>

<div class="section video">
    <iframe src="https://www.youtube.com/embed/Vbdw70LQgwA"></iframe>
</div>

<!-- CONTACT -->
<div class="contact">
    <h2>Let’s make something impossible to ignore.</h2>
    <p>takkelapallyharshith5@gmail.com</p>
</div>

<script>

// ENTER EFFECT
function enterSite(){
    document.querySelector('.entry').classList.add('fade-out');
}

// SCROLL REVEAL
const videos = document.querySelectorAll('.video');

window.addEventListener('scroll', () => {
    videos.forEach(v => {
        const top = v.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            v.classList.add('show');
        }
    });
});

</script>

</body>
</html>
