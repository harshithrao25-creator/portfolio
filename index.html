<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshith</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body {
    background:black;
    color:white;
    overflow-x:hidden;
}

/* ================= ENTRY ================= */
.entry {
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
    cursor:pointer;
    transition:1s;
}

.entry h1 {
    font-size:70px;
    letter-spacing:8px;
    animation:enterAnim 2s infinite;
}

@keyframes enterAnim {
    0% {opacity:0.4; transform:scale(0.95);}
    50% {opacity:1; transform:scale(1.05);}
    100% {opacity:0.4; transform:scale(0.95);}
}

/* ================= HERO ================= */
.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size: clamp(40px, 8vw, 100px);
    animation:fadeUp 1.2s forwards;
}

.hero h2 {
    font-size: clamp(40px, 8vw, 100px);
    color:#666;
    animation:fadeUp 1.2s forwards;
    animation-delay:0.5s;
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(40px);}
    to {opacity:1; transform:translateY(0);}
}

/* ARROW */
.arrow {
    position:absolute;
    bottom:30px;
    font-size:28px;
    animation:bounce 2s infinite;
}

@keyframes bounce {
    0%,100% {transform:translateY(0);}
    50% {transform:translateY(10px);}
}

/* ================= SECTION ================= */
.section {
    padding:50px 6%;
}

/* TITLE */
.name {
    text-align:center;
    font-size:26px;
    margin-bottom:25px;
    color:#aaa;
}

/* ================= LONG VIDEOS ================= */
.video {
    width:100%;
    aspect-ratio:16/9;
    margin-bottom:30px;
}

.video iframe {
    width:100%;
    height:100%;
    border:none;
    border-radius:12px;
}

/* ================= SHORTS ================= */
.shorts {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    justify-items:center;
}

/* SMALLER SHORTS */
.shorts iframe {
    width:85%; /* smaller */
    aspect-ratio:9/16;
    border:none;
    border-radius:12px;
    transition:0.3s;
}

/* hover */
.shorts iframe:hover {
    transform:scale(1.05);
}

/* MOBILE */
@media(max-width:768px){

    .shorts {
        grid-template-columns:1fr;
    }

    .shorts iframe {
        width:90%;
    }

    .hero h1, .hero h2 {
        font-size:32px;
    }
}

/* ================= CONTACT ================= */
.contact {
    padding:80px 20px;
    text-align:center;
}

/* BIG CTA */
.contact h2 {
    font-size:32px;
    margin-bottom:25px;
}

/* BUTTON */
.email {
    display:inline-block;
    padding:16px 30px;
    border:1px solid #555;
    border-radius:50px;
    color:white;
    text-decoration:none;
    font-size:16px;
    letter-spacing:1px;
    transition:0.3s;
}

/* HOVER EFFECT */
.email:hover {
    background:white;
    color:black;
    box-shadow:0 0 25px rgba(255,255,255,0.4);
    transform:scale(1.08);
}
</style>
</head>

<body>

<!-- ENTRY -->
<div class="entry" onclick="enterSite()">
    <h1>ENTER</h1>
</div>

<!-- HERO -->
<div class="hero">
    <h1>I don’t edit.</h1>
    <h2>I control emotion.</h2>
    <div class="arrow">↓</div>
</div>

<!-- CONTENT -->
<div class="section">

    <div class="name">Editing Showcase</div>

    <!-- LONG VIDEOS -->
    <div class="video">
        <iframe src="https://www.youtube.com/embed/7iF0aMuY6PI"></iframe>
    </div>

    <div class="video">
        <iframe src="https://www.youtube.com/embed/FFuEp2kLN2I"></iframe>
    </div>

    <!-- SHORTS -->
    <div class="shorts">
        <iframe src="https://www.youtube.com/embed/yFfvWJ4ijwo"></iframe>
        <iframe src="https://www.youtube.com/embed/Vbdw70LQgwA"></iframe>
        <iframe src="https://www.youtube.com/embed/Uxw-Vk4BZQQ"></iframe>
        <iframe src="https://www.youtube.com/embed/RaEjQFuOjyA"></iframe>
    </div>

</div>

<!-- CONTACT -->
<div class="contact">
    <h2>Let’s create something powerful.</h2>

    <a href="https://mail.google.com/mail/?view=cm&to=takkelapallyharshith5@gmail.com" target="_blank" class="email">
        CONTACT ME
    </a>
</div>

<script>
function enterSite(){
    document.querySelector('.entry').style.opacity="0";
    setTimeout(()=> {
        document.querySelector('.entry').style.display="none";
    },800);
}
</script>

</body>
</html>
