<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harshith</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body {
    background:black;
    color:white;
    overflow-x:hidden;
}

/* ================= ENTRY ================= */
.entry {
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
    cursor:pointer;
}

.entry h1 {
    font-size:80px;
    letter-spacing:10px;
    animation:enterAnim 2s infinite;
}

@keyframes enterAnim {
    0% {opacity:0.3; transform:scale(0.9);}
    50% {opacity:1; transform:scale(1.15);}
    100% {opacity:0.3; transform:scale(0.9);}
}

/* ================= HERO ================= */
.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size: clamp(40px, 8vw, 100px);
    animation:fadeUp 1.2s forwards;
}

.hero h2 {
    font-size: clamp(40px, 8vw, 100px);
    color:#666;
    animation:fadeUp 1.2s forwards;
    animation-delay:0.5s;
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(40px);}
    to {opacity:1; transform:translateY(0);}
}

/* ARROW */
.arrow {
    position:absolute;
    bottom:30px;
    font-size:28px;
    animation:bounce 2s infinite;
}

@keyframes bounce {
    0%,100% {transform:translateY(0);}
    50% {transform:translateY(12px);}
}

/* ================= SECTION ================= */
.section {
    padding:60px 6%;
}

/* TITLE */
.name {
    text-align:center;
    font-size:28px;
    margin-bottom:30px;
    color:#aaa;
}

/* ================= LONG VIDEOS ================= */
.video {
    width:100%;
    aspect-ratio:16/9;
    margin-bottom:30px;
}

.video iframe {
    width:100%;
    height:100%;
    border:none;
    border-radius:14px;
}

/* ================= SHORTS ================= */
.shorts {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    justify-items:center;
}

.shorts iframe {
    width:80%;
    aspect-ratio:9/16;
    border:none;
    border-radius:14px;
    transition:0.3s;
}

.shorts iframe:hover {
    transform:scale(1.05);
}

/* MOBILE */
@media(max-width:768px){
    .shorts {
        grid-template-columns:1fr;
    }

    .shorts iframe {
        width:90%;
    }

    .hero h1, .hero h2 {
        font-size:32px;
    }
}

/* ================= INSANE CTA ================= */
.contact {
    padding:140px 20px;
    text-align:center;
}

/* TEXT */
.contact h2 {
    font-size: clamp(32px, 5vw, 70px);
    margin-bottom:60px;
}

/* CTA BUTTON */
.cta {
    position:relative;
    display:inline-block;
    padding:25px 60px;
    font-size:20px;
    letter-spacing:3px;
    text-decoration:none;
    color:white;
    border-radius:60px;
    overflow:hidden;
    border:2px solid rgba(255,255,255,0.2);
    transition:0.3s;
}

/* GLOW BACKGROUND */
.cta::after {
    content:'';
    position:absolute;
    inset:-5px;
    background:radial-gradient(circle, rgba(255,255,255,0.3), transparent);
    opacity:0;
    transition:0.4s;
}

/* LIGHT SWEEP */
.cta::before {
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
    transition:0.7s;
}

/* HOVER */
.cta:hover::before {
    left:100%;
}

.cta:hover::after {
    opacity:1;
}

.cta:hover {
    transform:scale(1.12);
    background:white;
    color:black;
    box-shadow:0 0 60px rgba(255,255,255,0.4);
}

/* ================= SCRIPT ANIMATION ================= */
.fade-out {
    opacity:0;
    transition:0.8s;
}
</style>
</head>

<body>

<!-- ENTRY -->
<div class="entry" onclick="enterSite()">
    <h1>ENTER</h1>
</div>

<!-- HERO -->
<div class="hero">
    <h1>I don’t edit.</h1>
    <h2>I control emotion.</h2>
    <div class="arrow">↓</div>
</div>

<!-- CONTENT -->
<div class="section">

    <div class="name">Editing Showcase</div>

    <!-- LONG -->
    <div class="video">
        <iframe src="https://www.youtube.com/embed/7iF0aMuY6PI"></iframe>
    </div>

    <div class="video">
        <iframe src="https://www.youtube.com/embed/FFuEp2kLN2I"></iframe>
    </div>

    <!-- SHORTS -->
    <div class="shorts">
        <iframe src="https://www.youtube.com/embed/yFfvWJ4ijwo"></iframe>
        <iframe src="https://www.youtube.com/embed/Vbdw70LQgwA"></iframe>
        <iframe src="https://www.youtube.com/embed/Uxw-Vk4BZQQ"></iframe>
        <iframe src="https://www.youtube.com/embed/RaEjQFuOjyA"></iframe>
    </div>

</div>

<!-- INSANE CTA -->
<div class="contact">
    <h2>Let’s create something impossible to ignore.</h2>

    <a href="https://mail.google.com/mail/?view=cm&to=takkelapallyharshith5@gmail.com" 
       target="_blank" 
       class="cta">
        LET’S WORK →
    </a>
</div>

<script>
function enterSite(){
    const entry = document.querySelector('.entry');
    entry.classList.add('fade-out');
    setTimeout(()=> entry.style.display="none",800);
}
</script>

</body>
</html>
